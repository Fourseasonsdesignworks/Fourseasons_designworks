<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="このサイトはFourseasons designworksについて紹介するページです。"
    />
    <link rel="icon" type="image/png" href="../img/top_about/favicon.png" />
    <title>Fourseasons_designworks</title>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend+Zetta:wght@100..900&family=Zen+Kaku+Gothic+New&display=swap"
      rel="stylesheet"
    />
    <!-- css -->
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/parts.css" />
    <link rel="stylesheet" href="../css/main.css" />
  </head>
</html>

<body>
  <header class="header_bar">
    <h1>
      <a href="../index.html"
        ><img
          class="logo"
          src="../img/top_about/logo.png"
          alt="fourseasons-logo"
      /></a>
    </h1>

    <a href="https://www.instagram.com/fourseasons_designworks/"
      ><img
        class="insta-logo"
        src="../img/top_about/Instagram_w.png"
        alt="instagram-logo"
    /></a>
  </header>

  <main class="contact_main">
    <section class="contact">
      <div class="title_center2 base_container">
        <h2><img src="../img/nav_title/contact.png" alt="done" /></h2>
        <p>　　どうぞ、おきがるに。</p>

        <img class="form_img" src="../img/btn/door_open.svg" alt="door_op" />
      </div>
    </section>

    <div class="form-container">
      <!-- actionのURLをメモしたものに差し替えてください -->
      <form
        action="https://docs.google.com/forms/u/0/d/e/1FAIpQLScJO_CnRkrR-1GJif8Y-P0wFCoNgxsevI3ULxzOY8toGixZcA/formResponse"
        method="POST"
        target="_self"
      >
        <!-- お名前 -->
        <div class="form-item">
          <label for="name">お名前 　<span class="required">必須</span></label
          ><br />
          <!-- name="entry.XXXX" をGoogleフォームのものに書き換える -->
          <input
            type="text"
            id="name"
            name="entry.2000472101"
            required
            placeholder="山田 太郎"
          />
        </div>

        <!-- メールアドレス -->
        <div class="form-item">
          <label for="email"
            >メールアドレス　 <span class="required">必須</span></label
          ><br />
          <input
            type="email"
            id="email"
            name="entry.1030131629"
            required
            placeholder="example@mail.com"
          />
        </div>

        <!-- お問い合わせ内容 -->
        <div class="form-item">
          <label for="message">お問い合わせ内容</label><br />
          <textarea
            id="message"
            name="entry.12293928"
            rows="5"
            placeholder="お問い合わせ内容をご記入ください"
          ></textarea>
        </div>

        <!-- 送信ボタン -->
        <div class="form-submit">
          <button type="submit">送 信</button>
        </div>
      </form>
    </div>

    <nav class="side_nav base_container">
      <ul>
        <li><a href="../about.html">ABOUT</a></li>
        <li><a href="../index.html#skills">SKILLS</a></li>
        <li><a href="../works/index-1.html">WORKS</a></li>
        <li><a href="#">CONTACT</a></li>
      </ul>
    </nav>
  </main>

  <footer>
    <p>©Fourseasons designworks 2026</p>
  </footer>
</body>
